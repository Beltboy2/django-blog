{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}

{% if user.is_staff %}

<div class="row">
    <!-- Left sidebar -->
    {% include 'dashboard/sidebar.html' %}
    <!-- load the sidebar here -->

    <!-- Right side content -->
    <div class="col-md-9">
        <h2>Edit Category</h2>

        <form action="{% url 'edit_category' category.id %}" method="POST" style="width: 500px;">
            {% csrf_token %}
            {{ form | crispy }}
            <button type="submit" class="btn btn-warning">Submit</button>
        </form>
        <br>
    </div>
</div>

{% else %}
<center><h1>You are forbiden</h1></center>
{% endif %}

{% endblock %}
